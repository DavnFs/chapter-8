apiVersion: apps/v1
kind: Deployment
metadata:
    name: calculator-deployment
    labels:
        app: calculator
spec:
    replicas: 3
    selector:
        matchLabels:
            app: calculator
    template:
        metadata:
            labels:
                app: calculator
        spec:
            containers:
                - name: calculator
                  image: yumemirai/calculator:{{VERSION}}
                  ports:
                      - containerPort: 8080
                  # resources:
                  #     requests:
                  #         memory: "256Mi"
                  #         cpu: "100m"
                  #     limits:
                  #         memory: "768Mi"
                  #         cpu: "500m"
                  env:
                      - name: JAVA_OPTS
                        value: "-Xms128m -Xmx512m -XX:+UseSerialGC"
