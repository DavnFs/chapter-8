apiVersion: apps/v1
kind: Deployment
metadata:
    name: calculator-deployment
    labels:
        app: calculator
spec:
    replicas: 3
    selector:
        matchLabels:
            app: calculator
    template:
        metadata:
            labels:
                app: calculator
        spec:
            containers:
                - name: calculator
                  image: yumemirai/calculator:{{VERSION}}
                  ports:
                      - containerPort: 8080
                  resources:
                      requests:
                          memory: "128Mi"
                          cpu: "50m"
                      limits:
                          memory: "256Mi"
                          cpu: "300m"
                  env:
                      - name: JAVA_OPTS
                        value: "-Xms64m -Xmx200m -XX:+UseSerialGC"
