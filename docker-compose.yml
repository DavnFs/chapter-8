services:
    jenkins:
        build: .
        container_name: jenkins
        user: root
        restart: unless-stopped
        network_mode: "host"
        volumes:
            - jenkins_home:/var/jenkins_home
            - /var/run/docker.sock:/var/run/docker.sock
            - ~/.kube:/host/.kube:ro
            - ~/.minikube:${HOME}/.minikube:ro

volumes:
    jenkins_home:
